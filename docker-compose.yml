version: '3.8'

services:
  puzzle2d:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - uploads-data:/app/server/uploads
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/puzzle2d.db
    restart: unless-stopped

volumes:
  uploads-data:
  db-data:
