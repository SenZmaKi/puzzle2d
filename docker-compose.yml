version: "3.8"

services:
  puzzle2d:
    image: ghcr.io/senzmaki/puzzle2d:latest
    ports:
      - "3000:3000"
    volumes:
      - uploads-data:/app/server/uploads
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/puzzle2d.db
    restart: unless-stopped

volumes:
  uploads-data:
  db-data:
